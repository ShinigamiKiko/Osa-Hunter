version: '3.9'

networks:
  osvguard:
    driver: bridge

services:

  postgres:
    image: postgres:16-alpine
    container_name: osvguard-postgres
    networks:
      - osvguard
    environment:
      POSTGRES_DB:       ${PGDATABASE:-osa}
      POSTGRES_USER:     ${PGUSER:-osa}
      POSTGRES_PASSWORD: ${PGPASSWORD:-osa}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-osa} -d ${PGDATABASE:-osa}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: osvguard-backend
    networks:
      - osvguard
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGDATABASE=${PGDATABASE:-osa}
      - PGUSER=${PGUSER:-osa}
      - PGPASSWORD=${PGPASSWORD:-osa}
      - NODE_ENV=production
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - trivy-cache:/root/.cache/trivy
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: osvguard-frontend
    networks:
      - osvguard
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  trivy-cache:
  postgres-data:

version: '3.9'

networks:
  osvguard:
    driver: bridge

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: osvguard-backend
    networks:
      - osvguard
    ports:
      - "3001:3001"
    environment:
      - NVD_API_KEY=${NVD_API_KEY:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - trivy-cache:/root/.cache/trivy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: osvguard-frontend
    networks:
      - osvguard
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  trivy-cache:

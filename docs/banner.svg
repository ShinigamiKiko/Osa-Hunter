<svg viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" width="900" height="280">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1520"/>
      <stop offset="100%" stop-color="#060b10"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5ef0c8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5ef0c8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><rect width="900" height="280" rx="16"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Background -->
    <rect width="900" height="280" fill="url(#bgGrad)" rx="16"/>

    <!-- Grid lines -->
    <g opacity="0.06" stroke="#5ef0c8" stroke-width="0.5">
      <line x1="0" y1="56" x2="900" y2="56"/>
      <line x1="0" y1="112" x2="900" y2="112"/>
      <line x1="0" y1="168" x2="900" y2="168"/>
      <line x1="0" y1="224" x2="900" y2="224"/>
      <line x1="150" y1="0" x2="150" y2="280"/>
      <line x1="300" y1="0" x2="300" y2="280"/>
      <line x1="450" y1="0" x2="450" y2="280"/>
      <line x1="600" y1="0" x2="600" y2="280"/>
      <line x1="750" y1="0" x2="750" y2="280"/>
    </g>

    <!-- Glow blobs -->
    <ellipse cx="200" cy="140" rx="200" ry="150" fill="url(#glowGreen)"/>
    <ellipse cx="720" cy="120" rx="180" ry="140" fill="url(#glowBlue)"/>

    <!-- Radar circle (left side) -->
    <g transform="translate(155,140)">
      <circle r="90" fill="none" stroke="#5ef0c8" stroke-width="0.5" opacity="0.2"/>
      <circle r="60" fill="none" stroke="#5ef0c8" stroke-width="0.5" opacity="0.2"/>
      <circle r="30" fill="none" stroke="#5ef0c8" stroke-width="0.5" opacity="0.2"/>
      <!-- Crosshair -->
      <line x1="-95" y1="0" x2="95" y2="0" stroke="#5ef0c8" stroke-width="0.4" opacity="0.15"/>
      <line x1="0" y1="-95" x2="0" y2="95" stroke="#5ef0c8" stroke-width="0.4" opacity="0.15"/>
      <!-- Sweep arm -->
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
        <line x1="0" y1="0" x2="0" y2="-88" stroke="#5ef0c8" stroke-width="1.5" opacity="0.7" filter="url(#glow)"/>
        <polygon points="0,0 -6,-85 6,-85" fill="#5ef0c8" opacity="0.4"/>
      </g>
      <!-- Blips -->
      <circle cx="42" cy="-38" r="3" fill="#ff3b30" filter="url(#glow)">
        <animate attributeName="opacity" values="0;1;0" dur="2.1s" begin="0.3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-55" cy="22" r="2.5" fill="#ffa500" filter="url(#glow)">
        <animate attributeName="opacity" values="0;1;0" dur="1.8s" begin="1.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="20" cy="65" r="2" fill="#5ef0c8" filter="url(#glow)">
        <animate attributeName="opacity" values="0;1;0" dur="2.4s" begin="0.7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-30" cy="-58" r="2" fill="#ffa500" filter="url(#glow)">
        <animate attributeName="opacity" values="0;1;0" dur="3s" begin="1.6s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Title -->
    <text x="290" y="105" font-family="'Courier New', monospace" font-size="11" fill="#5ef0c8" opacity="0.6" letter-spacing="4">
      OPEN SOURCE ATTACK HUNTER
    </text>
    <text x="286" y="165" font-family="'Courier New', monospace" font-size="52" font-weight="900" fill="#ffffff" filter="url(#softglow)" letter-spacing="-1">
      OSA Hunter
    </text>
    <!-- Accent line -->
    <rect x="290" y="178" width="340" height="2" fill="#5ef0c8" rx="1">
      <animate attributeName="width" values="0;340" dur="1s" fill="freeze"/>
    </rect>
    <text x="291" y="206" font-family="'Courier New', monospace" font-size="13" fill="#8a9ab0" letter-spacing="0.5">
      Vulnerability scanner for your entire stack
    </text>

    <!-- Stat pills -->
    <g transform="translate(290, 228)">
      <!-- Pill 1 -->
      <rect x="0" y="0" width="96" height="26" rx="13" fill="#0d1f15" stroke="#5ef0c8" stroke-width="1" opacity="0.8"/>
      <text x="48" y="17" font-family="'Courier New', monospace" font-size="10" fill="#5ef0c8" text-anchor="middle" font-weight="700">6 SCAN TYPES</text>
      <!-- Pill 2 -->
      <rect x="106" y="0" width="96" height="26" rx="13" fill="#1a0f0a" stroke="#ff9500" stroke-width="1" opacity="0.8"/>
      <text x="154" y="17" font-family="'Courier New', monospace" font-size="10" fill="#ff9500" text-anchor="middle" font-weight="700">24H CACHE</text>
      <!-- Pill 3 -->
      <rect x="212" y="0" width="96" height="26" rx="13" fill="#0a0f1a" stroke="#38bdf8" stroke-width="1" opacity="0.8"/>
      <text x="260" y="17" font-family="'Courier New', monospace" font-size="10" fill="#38bdf8" text-anchor="middle" font-weight="700">SELF-HOSTED</text>
    </g>

    <!-- Right side: floating scan result cards -->
    <g transform="translate(660, 45)" opacity="0.9">
      <!-- Card 1: CRITICAL -->
      <rect x="0" y="0" width="210" height="46" rx="8" fill="#0f0505" stroke="rgba(255,59,48,0.4)" stroke-width="1"/>
      <rect x="0" y="0" width="4" height="46" rx="2" fill="#ff3b30"/>
      <text x="14" y="17" font-family="'Courier New', monospace" font-size="9" fill="#8a9ab0">lodash@4.17.20 · npm</text>
      <rect x="14" y="23" width="58" height="14" rx="4" fill="rgba(255,59,48,0.2)"/>
      <text x="43" y="33" font-family="'Courier New', monospace" font-size="8" fill="#ff3b30" text-anchor="middle" font-weight="700">CRITICAL</text>
      <text x="82" y="33" font-family="'Courier New', monospace" font-size="8" fill="#8a9ab0">CVE-2021-23337</text>
      <text x="196" y="33" font-family="'Courier New', monospace" font-size="8" fill="#ff9500" text-anchor="end">EPSS 91%</text>
      <animate attributeName="opacity" values="0;0.9" dur="0.4s" begin="0.2s" fill="freeze"/>
    </g>

    <g transform="translate(660, 103)" opacity="0.9">
      <rect x="0" y="0" width="210" height="46" rx="8" fill="#0a0e05" stroke="rgba(255,149,0,0.4)" stroke-width="1"/>
      <rect x="0" y="0" width="4" height="46" rx="2" fill="#ff9500"/>
      <text x="14" y="17" font-family="'Courier New', monospace" font-size="9" fill="#8a9ab0">nginx:1.24 · docker</text>
      <rect x="14" y="23" width="44" height="14" rx="4" fill="rgba(255,149,0,0.2)"/>
      <text x="36" y="33" font-family="'Courier New', monospace" font-size="8" fill="#ff9500" text-anchor="middle" font-weight="700">HIGH</text>
      <text x="68" y="33" font-family="'Courier New', monospace" font-size="8" fill="#8a9ab0">12 vulnerabilities</text>
      <text x="196" y="33" font-family="'Courier New', monospace" font-size="8" fill="#5ef0c8" text-anchor="end">KEV ⚑</text>
      <animate attributeName="opacity" values="0;0.9" dur="0.4s" begin="0.5s" fill="freeze"/>
    </g>

    <g transform="translate(660, 161)" opacity="0.9">
      <rect x="0" y="0" width="210" height="46" rx="8" fill="#050d0f" stroke="rgba(56,189,248,0.4)" stroke-width="1"/>
      <rect x="0" y="0" width="4" height="46" rx="2" fill="#38bdf8"/>
      <text x="14" y="17" font-family="'Courier New', monospace" font-size="9" fill="#8a9ab0">owner/repo · semgrep</text>
      <rect x="14" y="23" width="50" height="14" rx="4" fill="rgba(56,189,248,0.2)"/>
      <text x="39" y="33" font-family="'Courier New', monospace" font-size="8" fill="#38bdf8" text-anchor="middle" font-weight="700">MEDIUM</text>
      <text x="74" y="33" font-family="'Courier New', monospace" font-size="8" fill="#8a9ab0">SQL injection risk</text>
      <animate attributeName="opacity" values="0;0.9" dur="0.4s" begin="0.8s" fill="freeze"/>
    </g>

    <g transform="translate(660, 219)" opacity="0.9">
      <rect x="0" y="0" width="210" height="46" rx="8" fill="#030d07" stroke="rgba(94,240,200,0.3)" stroke-width="1"/>
      <rect x="0" y="0" width="4" height="46" rx="2" fill="#5ef0c8"/>
      <text x="14" y="17" font-family="'Courier New', monospace" font-size="9" fill="#8a9ab0">requests@2.31.0 · PyPI</text>
      <rect x="14" y="23" width="36" height="14" rx="4" fill="rgba(94,240,200,0.15)"/>
      <text x="32" y="33" font-family="'Courier New', monospace" font-size="8" fill="#5ef0c8" text-anchor="middle" font-weight="700">CLEAN</text>
      <text x="60" y="33" font-family="'Courier New', monospace" font-size="8" fill="#5ef0c8">✓ No vulnerabilities found</text>
      <animate attributeName="opacity" values="0;0.9" dur="0.4s" begin="1.1s" fill="freeze"/>
    </g>

    <!-- Scanning pulse line -->
    <line x1="0" y1="279" x2="900" y2="279" stroke="#5ef0c8" stroke-width="1" opacity="0.3"/>
    <rect x="0" y="277" width="60" height="3" rx="1" fill="#5ef0c8" opacity="0.6">
      <animateTransform attributeName="transform" type="translate" values="-60,0;900,0" dur="2.5s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>

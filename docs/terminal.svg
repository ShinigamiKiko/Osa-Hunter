<svg viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg" width="720" height="360">
  <defs>
    <radialGradient id="tbg" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#0f1a14"/>
      <stop offset="100%" stop-color="#070d0b"/>
    </radialGradient>
    <filter id="tglow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="tclip"><rect width="720" height="360" rx="12"/></clipPath>
  </defs>
  <g clip-path="url(#tclip)">
    <rect width="720" height="360" fill="url(#tbg)" rx="12"/>
    <!-- Terminal titlebar -->
    <rect width="720" height="36" fill="#0c1510" rx="0"/>
    <rect width="720" height="1" y="36" fill="#1a2d20" opacity="0.8"/>
    <!-- Traffic lights -->
    <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="18" r="6" fill="#febc2e"/>
    <circle cx="60" cy="18" r="6" fill="#28c840"/>
    <!-- Title -->
    <text x="360" y="23" font-family="'Courier New', monospace" font-size="12" fill="#4a6a50" text-anchor="middle" letter-spacing="2">OSA HUNTER — SCAN SESSION</text>

    <!-- Terminal content -->
    <g font-family="'Courier New', monospace" font-size="12.5">

      <!-- Line 1 - instant -->
      <text x="20" y="68" fill="#4a6a50">$</text>
      <text x="34" y="68" fill="#8ab090"> curl -X POST /api/libscan -d </text>
      <text x="294" y="68" fill="#5ef0c8">'{"name":"lodash","ecosystem":"npm","version":"4.17.20"}'</text>

      <!-- Line 2 -->
      <text x="20" y="92" fill="#2a4a30" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.6s" fill="freeze"/>
      </text>
      <text x="20" y="92" fill="#4a7050" opacity="0">
        [libscan] npm/lodash@4.17.20
        <animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.6s" fill="freeze"/>
      </text>

      <!-- Line 3 -->
      <text x="20" y="114" fill="#3a6040" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.0s" fill="freeze"/>
        [osv]    querying OSV database...
      </text>
      <text x="20" y="114" fill="#4a7050" opacity="0">
        [osv]    querying OSV database...
        <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.0s" fill="freeze"/>
      </text>

      <!-- Line 4 -->
      <text x="20" y="136" fill="#5a8060" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.5s" fill="freeze"/>
      </text>
      <text x="20" y="136" fill="#5ef0c8" opacity="0">
        [osv]    ✓ 8 vulnerabilities found
        <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.5s" fill="freeze"/>
      </text>

      <!-- Line 5 -->
      <text x="20" y="158" fill="#6a9070" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.9s" fill="freeze"/>
      </text>
      <text x="20" y="158" fill="#8a9ab0" opacity="0">
        [nvd]    fetching CVSS scores...
        <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.9s" fill="freeze"/>
      </text>

      <!-- Line 6 -->
      <text x="20" y="180" fill="#7aa080" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.1s" begin="2.3s" fill="freeze"/>
      </text>
      <text x="20" y="180" fill="#8a9ab0" opacity="0">
        [epss]   fetching exploitation probabilities...
        <animate attributeName="opacity" values="0;1" dur="0.1s" begin="2.3s" fill="freeze"/>
      </text>

      <!-- Line 7 -->
      <text x="20" y="202" fill="#5ef0c8" opacity="0">
        [kev]    ⚑ CVE-2021-23337 in CISA KEV (actively exploited)
        <animate attributeName="opacity" values="0;1" dur="0.1s" begin="2.7s" fill="freeze"/>
      </text>

      <!-- Line 8 -->
      <text x="20" y="224" fill="#8a9ab0" opacity="0">
        [poc]    checking PoC exploit database...
        <animate attributeName="opacity" values="0;1" dur="0.1s" begin="3.1s" fill="freeze"/>
      </text>

      <!-- Line 9 -->
      <text x="20" y="246" fill="#ff3b30" opacity="0">
        [toxic]  ☠ WARNING: toxic repository detected
        <animate attributeName="opacity" values="0;1" dur="0.1s" begin="3.5s" fill="freeze"/>
      </text>

      <!-- Divider -->
      <line x1="20" y1="262" x2="700" y2="262" stroke="#1a3020" stroke-width="1" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.1s" begin="3.8s" fill="freeze"/>
      </line>

      <!-- Result -->
      <text x="20" y="284" fill="#5ef0c8" font-weight="bold" opacity="0">
        [cache]  SAVE lib:npm:lodash:4.17.20
        <animate attributeName="opacity" values="0;1" dur="0.1s" begin="3.9s" fill="freeze"/>
      </text>

      <!-- JSON output -->
      <text x="20" y="306" fill="#4a7050" opacity="0">
        {"topSeverity":"CRITICAL","vulns":8,"epss":0.912,"inKev":true,"toxic":true}
        <animate attributeName="opacity" values="0;1" dur="0.1s" begin="4.1s" fill="freeze"/>
      </text>

      <!-- Cursor -->
      <rect x="20" y="322" width="8" height="16" fill="#5ef0c8" rx="1" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;0;0" dur="1s" begin="4.3s" repeatCount="indefinite"/>
      </rect>
      <text x="20" y="335" fill="#4a6a50" opacity="0">
        $
        <animate attributeName="opacity" values="0;1" dur="0.1s" begin="4.3s" fill="freeze"/>
      </text>
    </g>

    <!-- Bottom scan line -->
    <rect x="0" y="357" width="80" height="3" rx="1" fill="#5ef0c8" opacity="0.5">
      <animateTransform attributeName="transform" type="translate" values="-80,0;720,0" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>

<svg viewBox="0 0 700 140" xmlns="http://www.w3.org/2000/svg" width="700" height="140">
  <defs>
    <clipPath id="cclip"><rect width="700" height="140" rx="12"/></clipPath>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5ef0c8" opacity="0.7"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff9500" opacity="0.7"/>
    </marker>
  </defs>
  <g clip-path="url(#cclip)">
    <rect width="700" height="140" fill="#070d0b" rx="12"/>

    <!-- Title -->
    <text x="350" y="22" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#4a6050" letter-spacing="3">SCAN CACHE — 24H TTL</text>

    <!-- Browser box -->
    <rect x="20" y="40" width="100" height="60" rx="8" fill="#0c1510" stroke="#1a2d20" stroke-width="1"/>
    <text x="70" y="66" text-anchor="middle" font-family="'Courier New',monospace" font-size="18">🌐</text>
    <text x="70" y="88" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#5ef0c8">Browser</text>

    <!-- API box -->
    <rect x="200" y="40" width="100" height="60" rx="8" fill="#0c1510" stroke="#1a2d20" stroke-width="1"/>
    <text x="250" y="66" text-anchor="middle" font-family="'Courier New',monospace" font-size="18">⚡</text>
    <text x="250" y="88" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#5ef0c8">API</text>

    <!-- Cache box -->
    <rect x="380" y="40" width="100" height="60" rx="8" fill="#0c1510" stroke="#5ef0c8" stroke-width="1" opacity="0.7"/>
    <text x="430" y="66" text-anchor="middle" font-family="'Courier New',monospace" font-size="18">🗄️</text>
    <text x="430" y="88" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#5ef0c8">Cache DB</text>

    <!-- External box -->
    <rect x="560" y="40" width="120" height="60" rx="8" fill="#0c0c15" stroke="#38bdf8" stroke-width="1" opacity="0.5"/>
    <text x="620" y="66" text-anchor="middle" font-family="'Courier New',monospace" font-size="18">🌍</text>
    <text x="620" y="88" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#38bdf8">OSV·NVD·Trivy</text>

    <!-- Arrow 1: Browser → API -->
    <line x1="122" y1="70" x2="197" y2="70" stroke="#5ef0c8" stroke-width="1.5" opacity="0.6" marker-end="url(#arr)"/>

    <!-- Arrow 2: API → Cache (check) -->
    <line x1="302" y1="65" x2="377" y2="65" stroke="#5ef0c8" stroke-width="1.5" opacity="0.6" marker-end="url(#arr)"/>
    <text x="340" y="58" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#4a6050">check</text>

    <!-- HIT path: Cache back to API -->
    <path d="M 430 40 Q 430 15 250 15 Q 200 15 200 40" fill="none" stroke="#5ef0c8" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5" marker-end="url(#arr)"/>
    <text x="320" y="11" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#5ef0c8" font-weight="bold">✓ HIT — instant</text>

    <!-- MISS path: API → External -->
    <line x1="482" y1="78" x2="557" y2="78" stroke="#ff9500" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5" marker-end="url(#arr2)"/>
    <text x="520" y="93" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#ff9500">MISS → fetch</text>

    <!-- Save back to cache -->
    <path d="M 560 85 Q 510 120 430 105" fill="none" stroke="#ff9500" stroke-width="1" stroke-dasharray="3,3" opacity="0.4" marker-end="url(#arr2)"/>
    <text x="490" y="120" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#ff9500">save 24h</text>

    <!-- Animated dot flowing browser → api -->
    <circle r="4" fill="#5ef0c8" opacity="0.9" filter="url(#softglow)">
      <animateMotion dur="1.5s" repeatCount="indefinite" begin="0s">
        <mpath>
          <path d="M 122,70 L 197,70"/>
        </mpath>
      </animateMotion>
    </circle>

    <!-- Pulse on cache box -->
    <rect x="380" y="40" width="100" height="60" rx="8" fill="none" stroke="#5ef0c8" stroke-width="2" opacity="0">
      <animate attributeName="opacity" values="0;0.4;0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="1;3;1" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
